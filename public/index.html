<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>인스타툰 홀덤</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="screen-home" class="screen">
  <div class="card home-card">
    <h1>🃏 인스타툰 홀덤</h1>
    <p class="subtitle">인스타 게시물 수만큼 칩을 받고 시작하는 홀덤</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="create">방 만들기</button>
      <button class="tab-btn" data-tab="join">방 참가하기</button>
    </div>

    <div id="tab-create" class="tab-panel active">
      <label>닉네임 (선택)</label>
      <input id="create-name" placeholder="예: 배덕슈" />
      <label>인스타그램 아이디 또는 링크</label>
      <input id="create-ig" placeholder="예: deoksyu_ 또는 https://instagram.com/deoksyu_" />
      <button id="btn-preview-create" class="btn-secondary">프로필 미리보기</button>
      <div id="preview-create" class="preview-box hidden"></div>
      <button id="btn-create" class="btn-primary">방 만들기</button>
    </div>

    <div id="tab-join" class="tab-panel">
      <label>방 코드</label>
      <input id="join-code" placeholder="예: AB12" maxlength="4" style="text-transform:uppercase" />
      <label>닉네임 (선택)</label>
      <input id="join-name" placeholder="예: 배덕슈" />
      <label>인스타그램 아이디 또는 링크</label>
      <input id="join-ig" placeholder="예: deoksyu_ 또는 https://instagram.com/deoksyu_" />
      <button id="btn-preview-join" class="btn-secondary">프로필 미리보기</button>
      <div id="preview-join" class="preview-box hidden"></div>
      <button id="btn-join" class="btn-primary">방 참가하기 (방장 승인 필요)</button>
      <button id="btn-fan-go" class="btn-secondary fan-go-btn">📣 팬으로 참가 (관전 · 응원만)</button>
    </div>

    <p id="home-error" class="error hidden"></p>
  </div>
</div>

<div id="screen-pending" class="screen hidden">
  <div class="card home-card" style="text-align:center;">
    <h1>⏳ 승인 대기 중</h1>
    <p class="subtitle">방장이 참가를 승인하면 자동으로 입장돼요.</p>
    <div id="pending-preview" class="preview-box"></div>
  </div>
</div>

<div id="screen-table" class="screen hidden">
  <div class="topbar">
    <div class="room-code">방 코드: <b id="room-code-label">-</b> <span id="player-count-label" class="player-count"></span></div>
    <div class="fan-link">응원 링크: <a id="fan-link" href="#" target="_blank">-</a> <button id="btn-copy-fan-link" class="btn-tiny">복사</button></div>
    <button id="btn-pending-open" class="btn-approve-open">✅ 참가 승인 <span id="pending-count-badge" class="pending-count-badge hidden"></span></button>
    <button id="btn-leave-open" class="btn-leave">🚪 퇴장</button>
  </div>

  <div id="pending-modal-overlay" class="pending-modal-overlay hidden">
    <div class="pending-modal">
      <div class="pending-title">🚪 참가 승인 대기</div>
      <div id="pending-list" class="pending-list"></div>
      <div id="pending-empty" class="pending-empty hidden">대기 중인 참가 신청이 없어요.</div>
      <button id="btn-pending-close" class="btn-tiny" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <div id="leave-modal-overlay" class="pending-modal-overlay hidden">
    <div class="pending-modal" style="max-width:340px; text-align:center;">
      <div class="pending-title">🚪 퇴장하시겠어요?</div>
      <p style="color:#9aa0ac; font-size:13px; margin-bottom:16px;">지금 진행 중인 판이 있다면 자동으로 폴드 처리돼요.</p>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button id="btn-leave-now" class="btn-primary" style="margin:0;">즉시 퇴장</button>
        <button id="btn-leave-scheduled" class="btn-secondary" style="margin:0;">이번 판 끝나고 퇴장</button>
        <button id="btn-leave-cancel" class="btn-tiny" style="margin-top:4px;">취소</button>
      </div>
    </div>
  </div>

  <div id="my-status" class="my-status hidden">
    <div class="ms-item">현상금 <b id="ms-bounty">0</b></div>
    <div class="ms-item">사냥 획득 <b id="ms-bounty-earned">0</b></div>
    <div class="ms-item">응원 <b id="ms-cheer">0</b>/21</div>
    <div id="ms-rebuy-tag" class="ms-tag hidden">🔄 무료 리바인 보유</div>
    <div id="ms-leave-tag" class="leave-scheduled-tag hidden">🚪 이번 판 끝나고 퇴장 예정 <button id="btn-cancel-leave" class="btn-tiny">취소</button></div>
  </div>
  <div id="card-inventory" class="card-inventory"></div>

  <div id="table-felt" class="table-felt">
    <div class="board-area">
      <div id="community-cards" class="cards"></div>
      <div id="pot-label" class="pot-label">Pot: 0</div>
      <div id="street-label" class="street-label"></div>
    </div>
    <div id="seats"></div>
  </div>

  <div id="result-banner" class="result-banner hidden"></div>

  <div class="controls">
    <div id="host-controls" class="host-controls hidden">
      <button id="btn-start" class="btn-primary">게임 시작</button>
      <button id="btn-next-hand" class="btn-primary hidden">다음 핸드</button>
    </div>
    <div id="action-controls" class="action-controls hidden">
      <button id="act-fold" class="btn-action fold">폴드</button>
      <button id="act-check" class="btn-action">체크</button>
      <button id="act-call" class="btn-action">콜</button>
      <input id="raise-amount" type="number" class="raise-input" />
      <button id="act-raise" class="btn-action raise">레이즈</button>
      <button id="act-allin" class="btn-action allin">올인</button>
    </div>
    <div id="waiting-label" class="waiting-label hidden">상대방 차례를 기다리는 중...</div>
  </div>
</div>

<div id="fan-toast" class="fan-toast hidden"></div>

<div id="gift-reveal-overlay" class="gift-reveal-overlay hidden">
  <div id="gift-reveal-card" class="gift-reveal-card">
    <div class="grc-shine"></div>
    <div class="grc-rarity" id="grc-rarity">SSR</div>
    <div class="grc-emoji" id="grc-emoji">🎁</div>
    <div class="grc-name" id="grc-name">기프트 이름</div>
    <div class="grc-type" id="grc-type">패시브</div>
    <div class="grc-desc" id="grc-desc">효과 설명</div>
    <div class="grc-street" id="grc-street">[플랍] 응원 0회 달성</div>
    <div class="grc-hint">화면을 클릭하면 다음으로 넘어가요</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
